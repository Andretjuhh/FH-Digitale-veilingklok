name: Build and deploy BackendAPI to Azure Web App

on:
  push:
    branches:
      - YOUR_DEPLOY_BRANCH   # e.g. main or deploy/azure

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # change if you use 7 or 6

      - name: Restore dependencies
        run: dotnet restore BackendAPI

      - name: Build
        run: dotnet build BackendAPI --configuration Release --no-restore

      - name: Publish
        run: dotnet publish BackendAPI --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: WebAppKlas1Groep2
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
