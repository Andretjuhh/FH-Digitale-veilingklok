version: "3.9"

services:
  api:
    build:
      context: ./VeilingKlokKlas1Groep2
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=SEBSPC\SQLEXPRESS;Database=VeilingKlokDb;User=sa;Password=${SA_PASSWORD:VeilingKlokPassword1234};TrustServerCertificate=true;
    depends_on:
      - db

  web:
    build:
      context: ./VeilingKlokKlas1Groep2/Application
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-ChangeMe!123}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data:
